<section class="systemctl-page">
  <div class="page-header">
    <div>
      <h1>User Services</h1>
    </div>
    <button mat-icon-button color="primary" (click)="loadUnits()" matTooltip="Refresh services">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  @if (units.length) {
    <div class="table-wrap">
      <table mat-table [dataSource]="units" class="units-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Unit</th>
          <td mat-cell *matCellDef="let unit">
            <span class="unit-name">{{ unit.name }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="active">
          <th mat-header-cell *matHeaderCellDef>Active</th>
          <td mat-cell *matCellDef="let unit">
            <span class="state" [class.state-active]="unit.active === 'active'">{{ unit.active }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="sub">
          <th mat-header-cell *matHeaderCellDef>State</th>
          <td mat-cell *matCellDef="let unit">{{ unit.sub }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let unit" class="description">{{ unit.description }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let unit" class="actions">
            <button
              mat-icon-button
              color="primary"
              (click)="startUnit(unit)"
              [disabled]="isRunningAnyAction(unit)"
              matTooltip="Start service"
              >
              @if (isRunningAction(unit, 'start')) {
                <mat-spinner diameter="22"></mat-spinner>
              } @else {
                <mat-icon>play_arrow</mat-icon>
              }
            </button>
            <button
              mat-icon-button
              color="warn"
              (click)="stopUnit(unit)"
              [disabled]="isRunningAnyAction(unit)"
              matTooltip="Stop service"
              >
              @if (isRunningAction(unit, 'stop')) {
                <mat-spinner diameter="22"></mat-spinner>
              } @else {
                <mat-icon>stop</mat-icon>
              }
            </button>
            <button
              mat-icon-button
              color="primary"
              (click)="restartUnit(unit)"
              [disabled]="isRunningAnyAction(unit)"
              matTooltip="Restart service"
              >
              @if (isRunningAction(unit, 'restart')) {
                <mat-spinner diameter="22"></mat-spinner>
              } @else {
                <mat-icon>restart_alt</mat-icon>
              }
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  } @else {
    <div class="empty-state">
      <mat-icon>settings_power</mat-icon>
      <h2>No user services</h2>
    </div>
  }
</section>
